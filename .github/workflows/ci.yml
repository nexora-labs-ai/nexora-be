name: Backend CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  quality-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Biome check
        run: npx biome check .

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test -- --runInBand

      - name: Docker build
        run: docker build -t nexora-be:ci .
