version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: npm run start:dev
    ports:
      - '3000:3000'
      - '9229:9229'
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    depends_on:
      - postgres
      - redis
    networks:
      - nexora-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexora_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - nexora-network

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    networks:
      - nexora-network

volumes:
  postgres_dev_data:

networks:
  nexora-network:
    driver: bridge
